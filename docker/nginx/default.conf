# ============================================
# Nginx Configuration - Kasirin Aja
# ============================================
# File ini mengatur bagaimana Nginx menangani
# HTTP request dan meneruskannya ke PHP-FPM.
# ============================================

server {
    # Port yang di-listen
    listen 80;

    # Document root Laravel (folder public)
    # Semua request dimulai dari folder ini
    root /var/www/html/public;

    # File index default
    index index.php index.html;

    # Server name (bisa pakai domain atau localhost)
    server_name localhost;

    # ---- Handle Request Biasa ----
    # Coba cari file/folder yang diminta,
    # kalau tidak ada, forward ke index.php (Laravel router)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ---- Handle Request PHP ----
    # Semua request .php diteruskan ke PHP-FPM
    location ~ \.php$ {
        # Split path info untuk routing Laravel
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # Forward ke service "app" di port 9000
        # "app" = nama service di docker-compose.yml
        fastcgi_pass app:9000;

        # File index untuk FastCGI
        fastcgi_index index.php;

        # Include parameter FastCGI standar
        include fastcgi_params;

        # Set SCRIPT_FILENAME supaya PHP tahu file mana yang dieksekusi
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Timeout settings (supaya tidak timeout saat proses lama)
        fastcgi_read_timeout 300;
    }

    # ---- Block akses ke file tersembunyi (.htaccess, .env, dll) ----
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ---- Optimasi untuk static files ----
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
