# ============================================
# Docker Compose - Kasirin Aja
# ============================================
# File ini mendefinisikan semua "services" (container)
# yang dibutuhkan aplikasi untuk berjalan.
#
# Services:
#   1. app    → PHP-FPM (menjalankan kode Laravel)
#   2. nginx  → Web server (menerima request dari browser)
#   3. mysql  → Database server
#
# Cara kerja:
#   Browser → Nginx (port 8080) → PHP-FPM (port 9000) → MySQL (port 3306)
# ============================================

version: '3.8'

services:
  # ---- SERVICE 1: APP (PHP-FPM) ----
  # Container ini menjalankan kode PHP Laravel
  app:
    build:
      context: .            # Build dari Dockerfile di folder ini
      dockerfile: Dockerfile
    container_name: kasirin-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      # Mount folder project ke container (live reload saat develop)
      - .:/var/www/html
      # Buat volume terpisah untuk vendor & node_modules
      # supaya tidak konflik antara host dan container
      - /var/www/html/vendor
      - /var/www/html/node_modules
    networks:
      - kasirin-network
    depends_on:
      mysql:
        condition: service_healthy  # Tunggu MySQL siap dulu baru start app

  # ---- SERVICE 2: NGINX (Web Server) ----
  # Container ini menerima HTTP request dan forward ke PHP-FPM
  nginx:
    image: nginx:alpine       # Image ringan berbasis Alpine Linux
    container_name: kasirin-nginx
    restart: unless-stopped
    ports:
      - "8080:80"             # Akses via http://localhost:8080
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - kasirin-network
    depends_on:
      - app

  # ---- SERVICE 3: MYSQL (Database) ----
  # Container ini menyimpan data aplikasi
  mysql:
    image: mysql:8.0
    container_name: kasirin-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: kasirin_aja        # Nama database
      MYSQL_ROOT_PASSWORD: secret        # Password root
      MYSQL_USER: kasirin                # Username untuk app
      MYSQL_PASSWORD: secret             # Password untuk app
    ports:
      - "3307:3306"           # Port 3307 di host, 3306 di container
    volumes:
      - mysql-data:/var/lib/mysql   # Persistent storage untuk data MySQL
    networks:
      - kasirin-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

# ---- NETWORKS ----
# Network = jaringan virtual supaya container bisa komunikasi
networks:
  kasirin-network:
    driver: bridge

# ---- VOLUMES ----
# Volume = penyimpanan persistent (data tidak hilang saat container di-restart)
volumes:
  mysql-data:
    driver: local
